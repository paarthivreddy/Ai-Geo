version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: geocare-postgres
    environment:
      POSTGRES_DB: geocare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../scripts/init-postgis.sql:/docker-entrypoint-initdb.d/init-postgis.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  osm-postgres:
    image: postgis/postgis:16-3.4
    container_name: geocare-osm-postgres
    environment:
      POSTGRES_DB: osm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - osmdata:/var/lib/postgresql/data
      - ../scripts/init-postgis.sql:/docker-entrypoint-initdb.d/init-postgis.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: geocare-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: geocare-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/geocare
      - OSM_DATABASE_URL=postgresql+asyncpg://postgres:postgres@osm-postgres:5432/osm
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - GEOGRAPHY_DATA_PATH=/data/geography
      - LIBPOSTAL_DATA_DIR=/usr/local/share/libpostal
      - MAX_FILE_SIZE_MB=2048
      - JWT_SECRET_KEY=dev-secret-change-in-production
      - LOG_LEVEL=DEBUG
      - DEBUG=true
    volumes:
      - ../backend:/app
      - geography-data:/data/geography
    depends_on:
      postgres:
        condition: service_healthy
      osm-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn geocare.main:app --host 0.0.0.0 --port 8000 --reload"

  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: geocare-celery-worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/geocare
      - OSM_DATABASE_URL=postgresql+asyncpg://postgres:postgres@osm-postgres:5432/osm
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - GEOGRAPHY_DATA_PATH=/data/geography
      - LIBPOSTAL_DATA_DIR=/usr/local/share/libpostal
      - CELERY_CONCURRENCY=4
      - LOG_LEVEL=INFO
    volumes:
      - ../backend:/app
      - geography-data:/data/geography
    depends_on:
      postgres:
        condition: service_healthy
      osm-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A geocare.infrastructure.queue.celery_app worker -l info -c 4 -Q standard,high,low

  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: geocare-celery-beat
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - ../backend:/app
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A geocare.infrastructure.queue.celery_app beat -l info

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: geocare-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
  osmdata:
  redisdata:
  geography-data: